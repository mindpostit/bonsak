/* ── ALGORITHMIC COMPATIBILITY ── */
function calcCompat(a,b){
  const W=[{s:20,d:5,w:1},{s:5,d:25,w:1.2},{s:15,d:8,w:.8},{s:18,d:6,w:1},{s:15,d:8,w:.8}];
  let raw=0;for(let i=0;i<5;i++){const m=a[i]===b[i];raw+=(m?W[i].s:W[i].d)*W[i].w;}
  return Math.round(Math.min(95,Math.max(25,(raw-29.8)/(92-29.8)*70+25)));
}

function getBestMatch(code){
  const all=Object.keys(T32);let bk=all[0],bs=0;
  for(const k of all){if(k===code)continue;const s=calcCompat(code,k);if(s>bs){bs=s;bk=k;}}
  return bk;
}

function getCode(sc){return AXIS_META.map((a,i)=>sc[i]>=a.max/2?"ESMRW"[i]:"IDPFN"[i]).join("");}

function findType(code){
  if(T32[code])return{code,...T32[code],typeKey:code,match:getBestMatch(code)};
  let bk="ISMRW",bs=-1;
  for(const k of Object.keys(T32)){let s=0;for(let i=0;i<5;i++)if(code[i]===k[i])s++;if(s>bs){bs=s;bk=k;}}
  return{code,...T32[bk],typeKey:code,match:getBestMatch(code)};
}

function isValidCode(c){return c.length===5&&[..."IDPFNESMRW"].length&&/^[IEDPSSMFRRNW]{5}$/.test(c)&&"IE".includes(c[0])&&"DS".includes(c[1])&&"PM".includes(c[2])&&"FR".includes(c[3])&&"NW".includes(c[4]);}

/* ── AXIS INSIGHTS ── */
function getAxisInsight(a,b){
  const ins=[];const labels=["판타지 성향","권력 역학","흥분 트리거","욕망 패턴","감각 범위"];
  const rules=[[["I","I","둘 다 친밀함을 원합니다."],["I","E","한 쪽은 안정, 한 쪽은 모험."],["E","I","한 쪽은 모험, 한 쪽은 안정."],["E","E","둘 다 새로운 것을 원합니다."]],
  [["D","S","주도-수용이 자연스럽게 맞습니다."],["S","D","주도-수용이 자연스럽게 맞습니다."],["D","D","둘 다 주도하려 합니다. 순서를 정하면 불꽃."],["S","S","둘 다 맡기려 합니다. 누군가 먼저 시작해야 해요."]],
  [["P","P","둘 다 몸에서 시작됩니다."],["M","M","둘 다 감정이 먼저. 대화가 최고의 전희."],["P","M","시작점이 다릅니다. 한 쪽이 기다려줘야 해요."],["M","P","시작점이 다릅니다. 한 쪽이 기다려줘야 해요."]],
  [["F","F","둘 다 먼저 원합니다."],["R","R","둘 다 천천히. 누군가 불을 붙여야 합니다."],["F","R","자연스러운 리듬. 한 쪽이 점화합니다."],["R","F","자연스러운 리듬. 한 쪽이 점화합니다."]],
  [["N","N","둘 다 한 곳에 집중. 깊이가 엄청납니다."],["W","W","둘 다 온몸. 끝없이 탐색하는 밤."],["N","W","한 쪽은 깊이, 한 쪽은 넓이. 조율하면 완벽."],["W","N","한 쪽은 깊이, 한 쪽은 넓이. 조율하면 완벽."]]];
  for(let i=0;i<5;i++){const f=rules[i].find(([x,y])=>x===a[i]&&y===b[i]);if(f){const good=i===1?(a[i]!==b[i]):(a[i]===b[i]);ins.push({axis:labels[i],text:f[2],status:good?"match":a[i]===b[i]&&i===1?"tension":"adjust"});}}
  return ins;
}

      {/* CTAs */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
        <button onClick={()=>setCResult(null)} style={{padding:"16px",border:"1px solid "+C.accent+"20",borderRadius:14,width:"100%",background:C.accent+"08",color:C.accent,fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>다른 코드로 비교하기</button>
        <button onClick={reset} style={{padding:"16px",border:"none",borderRadius:14,width:"100%",background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center"}}>다시 찾아보기</button>
      </div>
    </>)}

    {/* ── STATS TAB ── */}
    {cTab==="stats"&&(<>
      <Sec>
        <Label>나의 코드 입력</Label>
        <input value={myCode} onChange={e=>setMyCode(e.target.value.toUpperCase().slice(0,5))} placeholder="IDPFN" maxLength={5} style={{width:"100%",padding:"14px 16px",border:"1px solid "+(myT32?C.accent+"44":"rgba(255,255,255,0.08)"),borderRadius:12,background:"rgba(255,255,255,0.03)",color:C.accent,fontSize:20,fontWeight:700,letterSpacing:6,textAlign:"center",fontFamily:"'Bebas Neue',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        {myT32&&<div style={{textAlign:"center",marginTop:8,fontSize:14,color:C.scene}}>{myT32.emoji} {myT32.name}</div>}
      </Sec>

      {myT32&&(<>
        <Sec>
          <Label>📊 당신의 유형 통계</Label>
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",borderRadius:10,fontSize:13,color:C.scene,lineHeight:1.6,marginBottom:6}}>전체 사용자 중 약 <span style={{color:"#fff",fontWeight:600}}>{myT32.pop}%</span>가 당신과 같은 유형입니다</div>
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",borderRadius:10,fontSize:13,color:C.scene,lineHeight:1.6}}>가장 잘 맞는 유형: <span style={{color:"#fff",fontWeight:600}}>{T32[getBestMatch(myCode)]?.emoji} {T32[getBestMatch(myCode)]?.name}</span> ({calcCompat(myCode,getBestMatch(myCode))}%)</div>
        </Sec>

        <Sec>
          <Label>💕 유형별 궁합 TOP 10</Label>
          {Object.keys(T32).filter(k=>k!==myCode).map(k=>({key:k,...T32[k],score:calcCompat(myCode,k)})).sort((a,b)=>b.score-a.score).slice(0,10).map((ct,i)=>(
            <div key={ct.key} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<9?"1px solid rgba(255,255,255,0.03)":"none"}}>
              <div style={{fontSize:10,color:C.dim,fontFamily:"'Bebas Neue',sans-serif",width:20,textAlign:"center"}}>{i+1}</div>
              <div style={{fontSize:20}}>{ct.emoji}</div>
              <div style={{flex:1}}><div style={{fontSize:13,color:"#fff",fontWeight:600}}>{ct.name}</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,color:C.dim,letterSpacing:2}}>{ct.key}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:60,height:4,background:"rgba(255,255,255,0.03)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:ct.score+"%",background:ct.score>=80?"linear-gradient(90deg,#E84393,#6C5CE7)":ct.score>=60?"#A29BFE":"rgba(255,255,255,0.15)",transition:"width 1s ease"}}/></div>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:ct.score>=80?"#fff":ct.score>=60?C.scene:C.muted,minWidth:30,textAlign:"right"}}>{ct.score}%</span>
              </div>
            </div>))}
        </Sec>

        <Sec>
          <Label>🌍 전체 32유형 분포</Label>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {allTypes.map(([k,t])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:14,width:22,textAlign:"center"}}>{t.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:10,color:k===myCode?"#fff":C.muted,fontWeight:k===myCode?700:400}}>{t.name}</span>
                    <span style={{fontSize:10,color:k===myCode?t.color:C.dim}}>{t.pop}%</span>
                  </div>
                  <div style={{height:3,background:"rgba(255,255,255,0.03)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:(t.pop*12)+"%",background:k===myCode?t.color:"rgba(255,255,255,0.08)",transition:"width 1s ease"}}/></div>
                </div>
              </div>))}
          </div>
        </Sec>
      </>)}

      <button onClick={reset} style={{padding:"16px",border:"none",borderRadius:14,width:"100%",background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center",marginTop:8}}>다시 찾아보기</button>
    </>)}

    <p style={{textAlign:"center",fontSize:8.5,color:"#12101E",marginTop:24,paddingBottom:20,lineHeight:1.5}}>이 서비스는 사람을 연결하지 않습니다 · 코드 교환은 외부에서 자율적으로 이루어집니다</p>
  </>)}

  </div>
  </div>);
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
