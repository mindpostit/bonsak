  const order=["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10","Q11","Q12","Q13","Q14","Q15","Q16","Q17","Q18"];
  const cMap={};COMMON_Q.forEach(q=>cMap[q.id]=q);
  return order.map(id=>sw[id]||cMap[id]).filter(Boolean);
}

/* ── ALGORITHMIC COMPATIBILITY ── */
function calcCompat(a,b){
  const W=[{s:20,d:5,w:1},{s:5,d:25,w:1.2},{s:15,d:8,w:.8},{s:18,d:6,w:1},{s:15,d:8,w:.8}];
  let raw=0;for(let i=0;i<5;i++){const m=a[i]===b[i];raw+=(m?W[i].s:W[i].d)*W[i].w;}
  return Math.round(Math.min(95,Math.max(25,(raw-29.8)/(92-29.8)*70+25)));
}

function getBestMatch(code){
  const all=Object.keys(T32);let bk=all[0],bs=0;
  for(const k of all){if(k===code)continue;const s=calcCompat(code,k);if(s>bs){bs=s;bk=k;}}
  return bk;
}

function getCode(sc){return AXIS_META.map((a,i)=>sc[i]>=a.max/2?"ESMRW"[i]:"IDPFN"[i]).join("");}

function findType(code){
  if(T32[code])return{code,...T32[code],typeKey:code,match:getBestMatch(code)};
  let bk="ISMRW",bs=-1;
  for(const k of Object.keys(T32)){let s=0;for(let i=0;i<5;i++)if(code[i]===k[i])s++;if(s>bs){bs=s;bk=k;}}
  return{code,...T32[bk],typeKey:code,match:getBestMatch(code)};
}

function isValidCode(c){return c.length===5&&[..."IDPFNESMRW"].length&&/^[IEDPSSMFRRNW]{5}$/.test(c)&&"IE".includes(c[0])&&"DS".includes(c[1])&&"PM".includes(c[2])&&"FR".includes(c[3])&&"NW".includes(c[4]);}

/* ── AXIS INSIGHTS ── */
function getAxisInsight(a,b){
  const ins=[];const labels=["판타지 성향","권력 역학","흥분 트리거","욕망 패턴","감각 범위"];
  const rules=[[["I","I","둘 다 친밀함을 원합니다."],["I","E","한 쪽은 안정, 한 쪽은 모험."],["E","I","한 쪽은 모험, 한 쪽은 안정."],["E","E","둘 다 새로운 것을 원합니다."]],
  [["D","S","주도-수용이 자연스럽게 맞습니다."],["S","D","주도-수용이 자연스럽게 맞습니다."],["D","D","둘 다 주도하려 합니다. 순서를 정하면 불꽃."],["S","S","둘 다 맡기려 합니다. 누군가 먼저 시작해야 해요."]],
  [["P","P","둘 다 몸에서 시작됩니다."],["M","M","둘 다 감정이 먼저. 대화가 최고의 전희."],["P","M","시작점이 다릅니다. 한 쪽이 기다려줘야 해요."],["M","P","시작점이 다릅니다. 한 쪽이 기다려줘야 해요."]],
  [["F","F","둘 다 먼저 원합니다."],["R","R","둘 다 천천히. 누군가 불을 붙여야 합니다."],["F","R","자연스러운 리듬. 한 쪽이 점화합니다."],["R","F","자연스러운 리듬. 한 쪽이 점화합니다."]],
  [["N","N","둘 다 한 곳에 집중. 깊이가 엄청납니다."],["W","W","둘 다 온몸. 끝없이 탐색하는 밤."],["N","W","한 쪽은 깊이, 한 쪽은 넓이. 조율하면 완벽."],["W","N","한 쪽은 깊이, 한 쪽은 넓이. 조율하면 완벽."]]];
  for(let i=0;i<5;i++){const f=rules[i].find(([x,y])=>x===a[i]&&y===b[i]);if(f){const good=i===1?(a[i]!==b[i]):(a[i]===b[i]);ins.push({axis:labels[i],text:f[2],status:good?"match":a[i]===b[i]&&i===1?"tension":"adjust"});}}
  return ins;
}

const PH_SUB={warm:"긴장을 풀어보세요",core:"지금부터\n솔직해져야 합니다",deep:"당신도 몰랐던\n영역으로",last:""};
const C={bg:"#050510",scene:"#C8C4D8",prompt:"#FFFFFF",choice:"#DBD7EA",choiceBg:"rgba(255,255,255,0.03)",choiceHover:"rgba(255,255,255,0.07)",choiceBorder:"rgba(255,255,255,0.06)",choiceBorderHover:"rgba(232,67,147,0.25)",muted:"#7B7590",dim:"#4A4460",vdim:"#2A2540",accent:"#E84393",accent2:"#6C5CE7"};
const F="'Pretendard','Noto Sans KR',sans-serif";

/* ════════════════════════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════════════════════════ */
function App(){
  const[page,setPage]=useState("test"); // test | compare
  const[scr,setScr]=useState("splash");

  const[fade,setFade]=useState(true);

  const[phTr,setPhTr]=useState(null);
  const[splashDone,setSplashDone]=useState(false);

  // Compare state
  const[myCode,setMyCode]=useState("");
  const[theirCode,setTheirCode]=useState("");

  const go=s=>{setFade(false);setTimeout(()=>setScr(s),300);};
  const selG=g=>{setGender(g);setQs(buildQ(g));go("age");};
  const pick=idx=>{
    const ns=[...sc];ns[qs[qi].axis]+=idx;setSc(ns);
    if(qi<qs.length-1){const np=qs[qi+1]?.phase,cp=qs[qi]?.phase;
      if(np!==cp&&np!=="last"){
        setPhTr(PH[np]);setFade(false);
        setTimeout(()=>setFade(true),80);
        setTimeout(()=>{setFade(false);setTimeout(()=>{setPhTr(null);setQi(qi+1);},400);},4000);
      }
      else{setFade(false);setTimeout(()=>setQi(qi+1),280);}
    }else{const r=findType(getCode(ns));setRes(r);setMyCode(r.typeKey);go("result");}
  };
  const reset=()=>{setScr("landing");setGender(null);setQi(0);setSc([0,0,0,0,0]);setRes(null);setPage("test");};
  const goCompare=()=>{setPage("compare");setCResult(null);setCTab("compare");setFade(false);};

  const doCompare=()=>{
    const m=myCode.toUpperCase().trim(),t=theirCode.toUpperCase().trim();
    if(!isValidCode(m)||!isValidCode(t)){alert("유효한 5글자 코드를 입력해주세요 (예: IDPFN)");return;}
    const score=calcCompat(m,t);const insights=getAxisInsight(m,t);
    const mT=T32[m]||findType(m);const tT=T32[t]||findType(t);
    setCResult({my:m,their:t,score,insights,myType:mT,theirType:tT});
    setAnimPct(0);setTimeout(()=>setAnimPct(score),500);
  };

  const Sec=({children,sx})=><div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:16,padding:"20px 18px",marginBottom:14,...sx}}>{children}</div>;
  const Label=({children})=><div style={{fontSize:11,color:C.dim,letterSpacing:2,marginBottom:10,fontWeight:300}}>{children}</div>;

  const myT32=T32[myCode.toUpperCase().trim()];
  const allTypes=Object.entries(T32).sort((a,b)=>b[1].pop-a[1].pop);

  return(
  <div style={{minHeight:"100vh",background:C.bg,fontFamily:F,color:"#E8E6F0",position:"relative",overflow:"hidden"}}>
  <div style={{position:"fixed",top:"8%",left:"50%",transform:"translateX(-50%)",width:"100vw",height:"60vh",background:"radial-gradient(ellipse, rgba(232,67,147,0.03) 0%, transparent 55%)",pointerEvents:"none",filter:"blur(80px)"}}/>

  {/* ═══ SPLASH ═══ */}
  {scr==="splash"&&page==="test"&&(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:100,background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"splashFade 2.8s ease forwards"}}>
      <div style={{position:"absolute",width:"50vw",height:"50vh",background:"radial-gradient(ellipse,rgba(232,67,147,0.06) 0%,transparent 60%)",filter:"blur(60px)"}}/>
      <h1 style={{fontFamily:F,fontSize:52,fontWeight:900,margin:0,animation:"splashPulse 2.8s ease",letterSpacing:-1}}>
        <span style={{background:"linear-gradient(135deg,#E84393,#6C5CE7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>본색</span>
      </h1>
      <div style={{width:0,height:2,background:"linear-gradient(90deg,#E84393,#6C5CE7)",margin:"16px 0",borderRadius:1,animation:"lineGrow 1s ease 0.6s forwards"}}/>
      <p style={{fontSize:13,color:C.muted,fontWeight:300,margin:0,letterSpacing:2,opacity:0,animation:"subtitleIn 0.8s ease 1.2s forwards"}}>숨겨둔 욕망을 마주하는 시간</p>
    </div>
  )}

  <div style={{maxWidth:420,margin:"0 auto",padding:"0 24px",minHeight:"100vh",display:"flex",flexDirection:"column",opacity:fade?1:0,transform:fade?"translateY(0)":"translateY(16px)",transition:"opacity 0.4s ease, transform 0.4s ease"}}>

  {/* ════════════ TEST PAGE ════════════ */}
  {page==="test"&&(<>

    {phTr&&(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",padding:"0 24px"}}>
      <div style={{fontSize:10,color:C.accent,letterSpacing:6,fontWeight:400,textTransform:"uppercase",animation:"phNameIn 0.6s ease forwards",opacity:0}}>{phTr}</div>
      <div style={{width:0,height:1,background:"linear-gradient(90deg,transparent,"+C.accent+",transparent)",margin:"16px auto 20px",animation:"phLineGrow 0.5s ease 0.4s forwards",opacity:0}}/>
      <div style={{fontSize:22,color:"#fff",fontWeight:700,lineHeight:1.8,whiteSpace:"pre-line",animation:"phSubIn 0.6s ease 0.8s forwards",opacity:0}}>{PH_SUB[Object.keys(PH).find(k=>PH[k]===phTr)]}</div>
    </div></div>)}

    {scr==="landing"&&!phTr&&(
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",paddingBottom:48}}>
        <div style={{textAlign:"center",marginBottom:48}}>
          <div style={{fontSize:11,letterSpacing:6,color:C.dim,marginBottom:28,fontWeight:300}}>성적 취향 자기발견 테스트</div>
          <h1 style={{fontSize:42,fontWeight:900,lineHeight:1.2,margin:"0 0 6px",color:"#fff"}}>당신의 <span style={{background:"linear-gradient(90deg,#E84393,#6C5CE7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>본색</span>을<br/>드러낼 시간</h1>
          <p style={{fontSize:13.5,color:C.muted,lineHeight:1.8,margin:"28px 0 0",fontWeight:300}}>대부분의 사람은 자기 몸이 진짜 원하는 걸 모릅니다.<br/>사회가 정한 기준에 맞춰 욕망을 숨기고 있을 뿐.</p>
          <p style={{fontSize:13,color:C.scene,marginTop:16,lineHeight:1.6}}>18개의 질문이 당신을 장면 속으로 데려갑니다.<br/><span style={{color:C.accent,fontWeight:600}}>읽는 순간, 몸이 먼저 답합니다.</span></p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:11,color:C.dim,textAlign:"center",marginBottom:4,letterSpacing:2,fontWeight:300}}>성별을 선택하세요</div>
          {[["남성","M"],["여성","F"]].map(([l,v])=>(
            <button key={v} onClick={()=>selG(v)} style={{padding:"16px 20px",border:"1px solid "+C.choiceBorder,borderRadius:14,background:C.choiceBg,color:C.scene,fontSize:14.5,cursor:"pointer",transition:"all 0.2s",textAlign:"center",fontWeight:500}}
              onMouseEnter={e=>{e.target.style.background=C.choiceHover;e.target.style.borderColor=C.choiceBorderHover;}}
              onMouseLeave={e=>{e.target.style.background=C.choiceBg;e.target.style.borderColor=C.choiceBorder;}}>{l}</button>))}
        </div>
        <p style={{textAlign:"center",fontSize:10,color:C.muted,marginTop:24}}>🔞 만 19세 이상 · 모든 응답은 저장되지 않습니다</p>
      </div>
    )}

    {scr==="age"&&!phTr&&(
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <div style={{background:"rgba(232,67,147,0.03)",border:"1px solid rgba(232,67,147,0.1)",borderRadius:20,padding:"40px 28px",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:16}}>🔞</div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#fff",margin:"0 0 14px"}}>성인만 참여할 수 있습니다</h2>
          <p style={{fontSize:13.5,color:C.scene,lineHeight:1.7,margin:"0 0 8px"}}>이 테스트는 구체적인 성적 상황을 묘사하며<br/><span style={{color:C.accent,fontWeight:600}}>성행위, 판타지, 자위, 속박</span> 등의<br/>직접적인 내용을 포함합니다.</p>
          <p style={{fontSize:12,color:C.muted,lineHeight:1.6,margin:"0 0 28px"}}>질문을 읽는 것 자체가 경험입니다.<br/>당신의 몸이 어떻게 반응하는지 관찰해보세요.</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button onClick={()=>{setPhTr(PH.warm);setFade(false);setTimeout(()=>setFade(true),80);setTimeout(()=>{setFade(false);setTimeout(()=>{setPhTr(null);go("test");},400);},4000);}} style={{padding:"18px",border:"none",borderRadius:14,background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>네, 19세 이상입니다</button>
            <button onClick={reset} style={{padding:"14px",border:"1px solid "+C.choiceBorder,borderRadius:14,background:"transparent",color:C.dim,fontSize:13,cursor:"pointer"}}>돌아가기</button>
          </div>
        </div>
      </div>
    )}

    {scr==="test"&&qs.length>0&&!phTr&&(
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",paddingTop:24,paddingBottom:32}}>
        <div style={{marginBottom:36}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,color:C.dim,letterSpacing:2,fontWeight:300}}>{PH[qs[qi].phase]}</span>
            <span style={{fontSize:15,color:C.accent,fontWeight:700}}>{qi+1}<span style={{color:C.vdim,fontWeight:400}}> / {qs.length}</span></span>
          </div>
          <div style={{height:2,background:"rgba(255,255,255,0.025)",borderRadius:1}}><div style={{height:"100%",borderRadius:1,background:"linear-gradient(90deg,#E84393,#6C5CE7)",width:((qi+1)/qs.length*100)+"%",transition:"width 0.5s ease"}}/></div>
        </div>
        <div style={{marginBottom:qs[qi].prompt?20:32}}><p style={{fontSize:15.5,fontWeight:300,lineHeight:2,color:C.scene,whiteSpace:"pre-line",margin:0}}>{qs[qi].scene}</p></div>
        {qs[qi].prompt&&(<div style={{marginBottom:32}}><p style={{fontSize:20,fontWeight:800,lineHeight:1.5,color:C.prompt,whiteSpace:"pre-line",margin:0}}>{qs[qi].prompt}</p></div>)}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {qs[qi].a.map((a,i)=>(
            <button key={qi+"-"+i} onClick={()=>pick(i)} style={{padding:"20px",border:"1px solid "+C.choiceBorder,borderRadius:14,background:C.choiceBg,color:C.choice,fontSize:14,lineHeight:1.7,textAlign:"left",cursor:"pointer",transition:"all 0.2s",whiteSpace:"pre-line",fontWeight:400}}
              onMouseEnter={e=>{e.target.style.background=C.choiceHover;e.target.style.borderColor=C.choiceBorderHover;e.target.style.transform="translateX(3px)";}}
              onMouseLeave={e=>{e.target.style.background=C.choiceBg;e.target.style.borderColor=C.choiceBorder;e.target.style.transform="none";}}>{a}</button>))}
        </div>
      </div>
    )}

    {scr==="result"&&res&&!phTr&&(
      <div style={{flex:1,display:"flex",flexDirection:"column",paddingTop:44,paddingBottom:44}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:12,letterSpacing:4,color:C.dim,marginBottom:20,fontWeight:300}}>당신의 본색</div>
          <div style={{fontSize:56,marginBottom:10}}>{res.emoji}</div>
          <div style={{display:"inline-block",padding:"5px 16px",borderRadius:20,background:res.color+"10",border:"1px solid "+res.color+"22",fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:5,color:res.color,marginBottom:12}}>{res.typeKey}</div>
          <h2 style={{fontSize:32,fontWeight:900,color:"#fff",margin:"0 0 4px"}}>{res.name}</h2>
          <p style={{fontSize:13.5,color:C.muted,margin:0,fontWeight:300}}>{res.sub}</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:18,padding:"24px 22px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",bottom:-30,right:-30,width:120,height:120,background:"radial-gradient(circle,"+res.color+"0A 0%,transparent 60%)"}}/>
          <p style={{fontSize:14,lineHeight:1.9,color:C.scene,margin:0,position:"relative",fontWeight:300}}>{res.desc}</p>
        </div>
        <div style={{background:res.color+"06",borderRadius:14,padding:"16px 18px",border:"1px solid "+res.color+"12",marginBottom:16}}>
          <div style={{fontSize:11,color:C.dim,letterSpacing:2,marginBottom:6,fontWeight:300}}>🔥 끌리는 키워드</div>
          <p style={{fontSize:14.5,color:res.color,margin:0,fontWeight:600}}>{res.kink}</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,padding:"20px 18px",marginBottom:16,border:"1px solid rgba(255,255,255,0.03)"}}>
          <div style={{fontSize:11,color:C.dim,marginBottom:16,letterSpacing:2,fontWeight:300}}>욕망 스펙트럼</div>
          {AXIS_META.map((ax,i)=>{const v=sc[i];const pct=Math.max(10,Math.min(90,(v/ax.max)*100));const isR=v>=ax.max/2;return(
            <div key={i} style={{marginBottom:i<4?16:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,color:!isR?"#fff":C.dim,fontWeight:!isR?700:400}}>{ax.l}</span>
                <span style={{fontSize:12,color:isR?"#fff":C.dim,fontWeight:isR?700:400}}>{ax.r}</span>
              </div>
              <div style={{height:5,background:"rgba(255,255,255,0.025)",borderRadius:3,position:"relative"}}>
                <div style={{position:"absolute",top:0,left:0,height:"100%",borderRadius:3,background:"linear-gradient(90deg,"+res.color+"33,"+res.color+")",width:pct+"%",transition:"width 1.2s cubic-bezier(0.4,0,0.2,1)"}}/>
                <div style={{position:"absolute",top:-3,height:11,width:11,borderRadius:"50%",background:res.color,boxShadow:"0 0 10px "+res.color+"44",left:"calc("+pct+"% - 5px)",transition:"left 1.2s cubic-bezier(0.4,0,0.2,1)"}}/>
              </div>
            </div>);})}
        </div>
        <div onClick={goCompare} style={{background:"linear-gradient(135deg,"+C.accent+"12,"+C.accent2+"12)",borderRadius:14,padding:"20px 18px",marginBottom:28,border:"1px solid "+C.accent+"20",cursor:"pointer",transition:"all 0.2s"}}
          onMouseEnter={e=>{e.currentTarget.style.border="1px solid "+C.accent+"44";e.currentTarget.style.transform="scale(1.01)";}}
          onMouseLeave={e=>{e.currentTarget.style.border="1px solid "+C.accent+"20";e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:11,color:C.dim,marginBottom:8,letterSpacing:2,fontWeight:300}}>나와 가장 잘 맞는 유형</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>{T32[res.match]?.emoji} {res.match}<span style={{fontSize:12,fontWeight:400,color:C.muted,marginLeft:6}}>{T32[res.match]?.name}</span></div>
          </div>
          <div style={{padding:"14px",borderRadius:12,background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:14,fontWeight:700,textAlign:"center"}}>본색 궁합 보러가기 →</div>
        </div>
        <button onClick={reset} style={{padding:12,border:"none",background:"transparent",width:"100%",color:C.scene,fontSize:12,cursor:"pointer"}}>다시 테스트하기</button>
        <p style={{textAlign:"center",fontSize:8.5,color:"#12101E",marginTop:24,lineHeight:1.5}}>성과학 연구 기반 축 설계 · {gender==="F"?"여성 맞춤 문항 포함 · ":gender==="M"?"남성 맞춤 문항 포함 · ":""}의학적 진단 도구가 아닙니다</p>
      </div>
    )}
  </>)}

  {/* ════════════ COMPARE PAGE ════════════ */}
  {page==="compare"&&(<>
    <div style={{textAlign:"center",marginTop:28,marginBottom:24}}>
      <div style={{fontSize:11,letterSpacing:6,color:C.dim,marginBottom:12,fontWeight:300}}>본색 궁합</div>
      <h1 style={{fontSize:28,fontWeight:900,color:"#fff",margin:0,lineHeight:1.3}}>우리의 <span style={{background:"linear-gradient(90deg,#E84393,#6C5CE7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>욕망</span>은 맞을까?</h1>
      <p style={{fontSize:12,color:C.muted,marginTop:10,fontWeight:300}}>서로의 코드를 입력하면 5축 궁합을 분석합니다</p>
    </div>

    <div style={{display:"flex",gap:4,marginBottom:24,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4}}>

    </div>

    {/* ── COMPARE INPUT ── */}
    {cTab==="compare"&&!cResult&&(<>
      <Sec>
        <Label>나의 코드</Label>
        <input value={myCode} onChange={e=>setMyCode(e.target.value.toUpperCase().slice(0,5))} placeholder="IDPFN" maxLength={5} style={{width:"100%",padding:"14px 16px",border:"1px solid "+(myCode&&isValidCode(myCode)?C.accent+"44":"rgba(255,255,255,0.08)"),borderRadius:12,background:"rgba(255,255,255,0.03)",color:C.accent,fontSize:20,fontWeight:700,letterSpacing:6,textAlign:"center",fontFamily:"'Bebas Neue',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        {myCode&&T32[myCode]&&<div style={{textAlign:"center",marginTop:8,fontSize:13,color:C.scene}}>{T32[myCode].emoji} {T32[myCode].name}</div>}
        <div style={{height:20}}/>
        <Label>상대의 코드</Label>
        <input value={theirCode} onChange={e=>setTheirCode(e.target.value.toUpperCase().slice(0,5))} placeholder="ISMRW" maxLength={5} style={{width:"100%",padding:"14px 16px",border:"1px solid "+(theirCode&&isValidCode(theirCode)?C.accent2+"44":"rgba(255,255,255,0.08)"),borderRadius:12,background:"rgba(255,255,255,0.03)",color:C.accent2,fontSize:20,fontWeight:700,letterSpacing:6,textAlign:"center",fontFamily:"'Bebas Neue',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        {theirCode&&T32[theirCode]&&<div style={{textAlign:"center",marginTop:8,fontSize:13,color:C.scene}}>{T32[theirCode].emoji} {T32[theirCode].name}</div>}

      {isValidCode(myCode)&&(<div style={{marginBottom:16}}>
        <Label>나의 궁합 미리보기</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {(()=>{
            const mc=myCode.toUpperCase().trim();if(!isValidCode(mc))return null;
            const best=getBestMatch(mc);
            const allK=Object.keys(T32).filter(k=>k!==mc);
            const worst=allK.reduce((w,k)=>calcCompat(mc,k)<calcCompat(mc,w)?k:w,allK[0]);
            const sameDS=allK.find(k=>k[1]===mc[1]&&k!==best&&k!==worst)||allK[2];
            return[
              {label:"🔥 최고 궁합",their:best,desc:T32[best]?.name},
              {label:"⚡ 긴장 궁합",their:sameDS,desc:T32[sameDS]?.name},
              {label:"🧊 정반대",their:worst,desc:T32[worst]?.name},
              {label:"🪞 같은 유형",their:mc,desc:"나 vs 나"},
            ].map((d,i)=>(
            <button key={i} onClick={()=>{setTheirCode(d.their);}} style={{flex:"1 1 45%",padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.05)",background:"rgba(255,255,255,0.02)",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
              <div style={{fontSize:13,color:C.choice}}>{d.label}</div>
              <div style={{fontSize:10,color:C.dim,marginTop:2}}>{d.desc} ({calcCompat(mc,d.their)}%)</div>
            </button>));})()}
        </div>
      </div>)}

      <button onClick={doCompare} style={{padding:"18px",border:"none",borderRadius:14,width:"100%",background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",textAlign:"center",opacity:isValidCode(myCode)&&isValidCode(theirCode)?1:0.4,transition:"all 0.2s",marginBottom:6}}>본색 궁합 확인하기</button>
      <button onClick={reset} style={{padding:12,border:"none",background:"transparent",width:"100%",color:C.scene,fontSize:12,cursor:"pointer",marginTop:4}}>← 다시 찾아보기</button>
    </>)}

    {/* ── COMPARE RESULT ── */}
    {cTab==="compare"&&cResult&&(<>
      {/* Score ring */}
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{position:"relative",width:160,height:160,margin:"0 auto 16px"}}>
          <svg viewBox="0 0 160 160" style={{transform:"rotate(-90deg)"}}><circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth="6"/><circle cx="80" cy="80" r="68" fill="none" stroke="url(#cg)" strokeWidth="6" strokeLinecap="round" strokeDasharray={animPct*4.27+" 427"} style={{transition:"stroke-dasharray 1.5s cubic-bezier(0.4,0,0.2,1)"}}/><defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#E84393"/><stop offset="100%" stopColor="#6C5CE7"/></linearGradient></defs></svg>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color:"#fff",lineHeight:1}}>{animPct}<span style={{fontSize:20,color:C.muted}}>%</span></div>
          </div>
        </div>
        <p style={{fontSize:14,color:C.scene,lineHeight:1.7,margin:0,fontWeight:300,padding:"0 10px"}}>{cResult.score>=80?"불꽃이 확실합니다.\n서로의 욕망이 자연스럽게 맞물립니다.":cResult.score>=60?"좋은 궁합입니다.\n몇 가지만 맞추면 폭발할 수 있어요.":cResult.score>=40?"흥미로운 긴장감이 있습니다.\n대화가 열쇠입니다.":"정반대의 매력.\n서로를 이해하면 예상치 못한 화학 반응이 가능합니다."}</p>
      </div>

      {/* Two type cards */}
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        {[{t:cResult.myType,code:cResult.my,label:"나",c:C.accent},{t:cResult.theirType,code:cResult.their,label:"상대",c:C.accent2}].map(({t,code,label,c})=>(
          <div key={label} style={{flex:1,background:c+"08",border:"1px solid "+c+"18",borderRadius:16,padding:"18px 14px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.dim,marginBottom:8,letterSpacing:2}}>{label}</div>
            <div style={{fontSize:32,marginBottom:6}}>{t.emoji}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:c,letterSpacing:4,marginBottom:4}}>{code}</div>
            <div style={{fontSize:14,color:"#fff",fontWeight:700}}>{t.name}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:4,fontWeight:300}}>{t.sub}</div>
          </div>))}
      </div>

      {/* 5-axis comparison */}
      <Sec>
        <Label>5축 욕망 비교</Label>
        {cResult.insights.map((ins,i)=>(
          <div key={i} style={{marginBottom:i<4?18:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:13,color:C.scene,fontWeight:600}}>{ins.axis}</span>
              <span style={{fontSize:10,padding:"3px 10px",borderRadius:10,background:ins.status==="match"?"rgba(0,184,148,0.12)":ins.status==="tension"?"rgba(232,67,147,0.12)":"rgba(162,155,254,0.12)",color:ins.status==="match"?"#00B894":ins.status==="tension"?"#E84393":"#A29BFE",fontWeight:600}}>{ins.status==="match"?"✓ 일치":ins.status==="tension"?"⚡ 긴장":"△ 조율"}</span>
            </div>
            <div style={{fontSize:13,color:C.muted,lineHeight:1.6}}>{ins.text}</div>
          </div>))}
      </Sec>

      {/* CTAs */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
        <button onClick={()=>setCResult(null)} style={{padding:"16px",border:"1px solid "+C.accent+"20",borderRadius:14,width:"100%",background:C.accent+"08",color:C.accent,fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>다른 코드로 비교하기</button>
        <button onClick={reset} style={{padding:"16px",border:"none",borderRadius:14,width:"100%",background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center"}}>다시 찾아보기</button>
      </div>
    </>)}

    {/* ── STATS TAB ── */}
    {cTab==="stats"&&(<>
      <Sec>
        <Label>나의 코드 입력</Label>
        <input value={myCode} onChange={e=>setMyCode(e.target.value.toUpperCase().slice(0,5))} placeholder="IDPFN" maxLength={5} style={{width:"100%",padding:"14px 16px",border:"1px solid "+(myT32?C.accent+"44":"rgba(255,255,255,0.08)"),borderRadius:12,background:"rgba(255,255,255,0.03)",color:C.accent,fontSize:20,fontWeight:700,letterSpacing:6,textAlign:"center",fontFamily:"'Bebas Neue',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        {myT32&&<div style={{textAlign:"center",marginTop:8,fontSize:14,color:C.scene}}>{myT32.emoji} {myT32.name}</div>}
      </Sec>

      {myT32&&(<>
        <Sec>
          <Label>📊 당신의 유형 통계</Label>
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",borderRadius:10,fontSize:13,color:C.scene,lineHeight:1.6,marginBottom:6}}>전체 사용자 중 약 <span style={{color:"#fff",fontWeight:600}}>{myT32.pop}%</span>가 당신과 같은 유형입니다</div>
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",borderRadius:10,fontSize:13,color:C.scene,lineHeight:1.6}}>가장 잘 맞는 유형: <span style={{color:"#fff",fontWeight:600}}>{T32[getBestMatch(myCode)]?.emoji} {T32[getBestMatch(myCode)]?.name}</span> ({calcCompat(myCode,getBestMatch(myCode))}%)</div>
        </Sec>

        <Sec>
          <Label>💕 유형별 궁합 TOP 10</Label>
          {Object.keys(T32).filter(k=>k!==myCode).map(k=>({key:k,...T32[k],score:calcCompat(myCode,k)})).sort((a,b)=>b.score-a.score).slice(0,10).map((ct,i)=>(
            <div key={ct.key} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<9?"1px solid rgba(255,255,255,0.03)":"none"}}>
              <div style={{fontSize:10,color:C.dim,fontFamily:"'Bebas Neue',sans-serif",width:20,textAlign:"center"}}>{i+1}</div>
              <div style={{fontSize:20}}>{ct.emoji}</div>
              <div style={{flex:1}}><div style={{fontSize:13,color:"#fff",fontWeight:600}}>{ct.name}</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,color:C.dim,letterSpacing:2}}>{ct.key}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:60,height:4,background:"rgba(255,255,255,0.03)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:ct.score+"%",background:ct.score>=80?"linear-gradient(90deg,#E84393,#6C5CE7)":ct.score>=60?"#A29BFE":"rgba(255,255,255,0.15)",transition:"width 1s ease"}}/></div>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:ct.score>=80?"#fff":ct.score>=60?C.scene:C.muted,minWidth:30,textAlign:"right"}}>{ct.score}%</span>
              </div>
            </div>))}
        </Sec>

        <Sec>
          <Label>🌍 전체 32유형 분포</Label>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {allTypes.map(([k,t])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:14,width:22,textAlign:"center"}}>{t.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:10,color:k===myCode?"#fff":C.muted,fontWeight:k===myCode?700:400}}>{t.name}</span>
                    <span style={{fontSize:10,color:k===myCode?t.color:C.dim}}>{t.pop}%</span>
                  </div>
                  <div style={{height:3,background:"rgba(255,255,255,0.03)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:(t.pop*12)+"%",background:k===myCode?t.color:"rgba(255,255,255,0.08)",transition:"width 1s ease"}}/></div>
                </div>
              </div>))}
          </div>
        </Sec>
      </>)}

      <button onClick={reset} style={{padding:"16px",border:"none",borderRadius:14,width:"100%",background:"linear-gradient(135deg,#E84393,#6C5CE7)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center",marginTop:8}}>다시 찾아보기</button>
    </>)}

    <p style={{textAlign:"center",fontSize:8.5,color:"#12101E",marginTop:24,paddingBottom:20,lineHeight:1.5}}>이 서비스는 사람을 연결하지 않습니다 · 코드 교환은 외부에서 자율적으로 이루어집니다</p>
  </>)}

  </div>
  </div>);
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
